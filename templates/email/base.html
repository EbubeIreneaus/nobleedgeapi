<!-- FILENAME: templates/email/base.html -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #080D1A; color: #E2E8F0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #111827; border: 1px solid #1C2539; border-radius: 12px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #0A0F1D 0%, #162035 100%); padding: 40px; text-align: center; border-bottom: 2px solid #3B82F6; }
        .logo { font-size: 28px; font-weight: bold; color: #3B82F6; text-transform: uppercase; letter-spacing: 2px; }
        .content { padding: 40px; line-height: 1.6; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #5C6B85; border-top: 1px solid #1C2539; }
        .button { display: inline-block; padding: 12px 24px; background-color: #3B82F6; color: #080D1A; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }
        h1 { color: #FFFFFF; font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">{{ project_name }}</div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; 2026 {{ project_name }}. All rights reserved.<br>
            Premium Investment Management
        </div>
    </div>
</body>
</html>
